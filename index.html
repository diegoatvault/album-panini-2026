<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Album FIFA 2026</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Georgia, serif; background: linear-gradient(128deg, rgba(255,211,47,0.24) 0 12%, transparent 12% 100%), linear-gradient(214deg, rgba(0,212,106,0.25) 0 18%, transparent 18% 100%), linear-gradient(160deg,#06134a,#005bff 38%,#e41443 72%,#15104d); min-height: 100vh; color: #fff; padding-bottom: 60px; position: relative; overflow-x: hidden; }
body::before { content: ""; position: fixed; inset: 0; background: url("0926-fifa-world-cup-mascots-vivid.png") center bottom 12px / min(94vw,880px) auto no-repeat; opacity: 0.54; pointer-events: none; z-index: 0; filter: saturate(1.34) contrast(1.14); }
body > * { position: relative; z-index: 1; }
.header { background: linear-gradient(95deg,#ff174f,#005bff 48%,#00d46a); padding: 16px 20px; text-align: center; border-bottom: 4px solid #ffd32f; box-shadow: 0 10px 30px rgba(0,0,0,0.28); }
.header h1 { font-size: 22px; margin: 4px 0; }
.header p { font-size: 13px; opacity: 0.95; }
.stats { display: flex; justify-content: center; gap: 10px; padding: 14px 14px; background: rgba(0,22,92,0.36); flex-wrap: wrap; border-bottom: 1px solid rgba(255,255,255,0.18); backdrop-filter: blur(4px); }
.stat { text-align: center; min-width: 76px; padding: 7px 10px; border-radius: 14px; background: rgba(255,255,255,0.13); border: 1px solid rgba(255,255,255,0.18); box-shadow: inset 0 1px 0 rgba(255,255,255,0.18); }
.stat-val { font-size: 22px; font-weight: bold; text-shadow: 0 2px 8px rgba(0,0,0,0.25); }
.stat-lbl { font-size: 11px; opacity: 0.82; text-transform: uppercase; letter-spacing: 1px; }
.progress-wrap { padding: 6px 16px 12px; }
.progress-bar { background: rgba(255,255,255,0.22); border-radius: 8px; height: 12px; overflow: hidden; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.12); }
.progress-fill { height: 100%; background: linear-gradient(90deg,#00e676,#ffd32f,#ff2e63,#20c8ff); border-radius: 8px; transition: width 0.4s; box-shadow: 0 0 18px rgba(255,211,47,0.42); }
.filters { display: flex; justify-content: center; gap: 8px; padding: 0 16px 8px; flex-wrap: wrap; }
.filter-btn { padding: 8px 18px; border-radius: 20px; border: 2px solid rgba(255,255,255,0.34); background: rgba(255,255,255,0.14); color: #fff; font-weight: bold; cursor: pointer; font-size: 14px; box-shadow: 0 5px 16px rgba(0,0,0,0.16); transition: transform 0.16s, filter 0.16s; }
.filter-btn.active { border-color: #ffd32f; background: linear-gradient(90deg,#ffd32f,#ffef73); color: #151000; }
#search { padding: 8px 14px; border-radius: 20px; border: 2px solid rgba(255,255,255,0.36); background: rgba(255,255,255,0.17); color: #fff; font-size: 14px; outline: none; width: 140px; box-shadow: 0 5px 16px rgba(0,0,0,0.16); }
#search::placeholder { color: rgba(255,255,255,0.78); }
.action-btns { display: flex; justify-content: center; gap: 8px; padding: 0 16px 10px; flex-wrap: wrap; }
.action-btn { padding: 8px 16px; border-radius: 20px; border: 2px solid; background: rgba(255,255,255,0.14); font-weight: bold; cursor: pointer; font-size: 13px; box-shadow: 0 5px 16px rgba(0,0,0,0.16); transition: transform 0.16s, filter 0.16s; }
.teams-bar { padding: 0 12px 10px; display: flex; gap: 6px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.teams-bar button { transition: transform 0.16s, filter 0.16s; }
.teams-bar::-webkit-scrollbar { display: none; }
.flag-emoji { display: inline-block; font-size: 1.3em; line-height: 0; margin-right: 3px; vertical-align: -0.14em; }
.groups { padding: 0 12px; }
.group { margin-bottom: 14px; border-radius: 12px; overflow: hidden; border: 2px solid rgba(255,255,255,0.22); background: rgba(1,21,83,0.46); box-shadow: 0 12px 30px rgba(0,0,0,0.22); backdrop-filter: blur(3px); }
.group-header { padding: 10px 14px; }
.group-title { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
.group-name { font-weight: bold; font-size: 16px; color: #fff; }
.group-count { background: rgba(0,0,0,0.38); border-radius: 10px; padding: 3px 10px; font-size: 13px; color: #fff; font-weight: bold; border: 1px solid rgba(255,255,255,0.2); }
.group-prog { background: rgba(0,0,0,0.34); border-radius: 4px; height: 6px; overflow: hidden; }
.group-prog-fill { height: 100%; border-radius: 4px; }
.stickers { display: grid; grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); gap: 6px; padding: 10px; }
.sticker { padding: 12px 8px; border-radius: 10px; border: 2px solid rgba(255,255,255,0.28); background: rgba(255,255,255,0.12); cursor: pointer; font-size: 14px; line-height: 1.25; font-weight: bold; color: #fff; text-align: center; box-shadow: inset 0 1px 0 rgba(255,255,255,0.13); transition: transform 0.16s, filter 0.16s; }
.sticker.have { border-color: #00e676; background: linear-gradient(160deg,rgba(0,230,118,0.34),rgba(0,168,92,0.18)); }
.filter-btn:hover,.action-btn:hover,.sticker:hover,.teams-bar button:hover { transform: translateY(-1px); filter: brightness(1.08) saturate(1.12); }
@media (max-width: 640px) { body::before { background-size: 146vw auto; background-position: center bottom 8px; opacity: 0.4; } .stat { min-width: 70px; } }
</style>
</head>

<div class="action-btns">

  <button class="action-btn" style="color:#00e676;border-color:#00e676;" onclick="printMissing()">🖨️ Imprimir faltan</button>

</div>

function teamInfo(team){return TEAM_META[team]||{flag:"",name:team};}
function teamCodeFromId(id){return id==="FWC00"?"FWC":(id.match(/^[A-Z]+/)||[""])[0];}
function teamChip(team){var info=teamInfo(team);return (info.flag?info.flag+" ":"")+team;}
function teamLabel(team){var info=teamInfo(team);return teamChip(team)+(info.name?" · "+info.name:"");}
function flagHTML(flag){return flag?'<span class="flag-emoji">'+escapeHTML(flag)+'</span>':"";}
function teamChipHTML(team){var info=teamInfo(team);return flagHTML(info.flag)+escapeHTML(team);}
function teamLabelHTML(team){var info=teamInfo(team);return teamChipHTML(team)+(info.name?" · "+escapeHTML(info.name):"");}
function displayCode(id){return id==="FWC00"?"00":id.replace(/^(FWC|CC)(\d+)$/,"$1-$2");}
function stickerLabel(id){return displayCode(id)+(STICKER_NAMES[id]?" · "+STICKER_NAMES[id]:"");}
function normalizeText(txt){return (txt||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");}
function stickerSearchText(id){var team=teamCodeFromId(id);var info=teamInfo(team);return normalizeText(id+" "+displayCode(id)+" "+(STICKER_NAMES[id]||"")+" "+team+" "+(info.name||""));}
function escapeHTML(txt){return String(txt).replace(/[&<>"]/g,function(ch){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[ch];});}
function mixColor(a,b,p){
  function parts(hex){return [parseInt(hex.slice(1,3),16),parseInt(hex.slice(3,5),16),parseInt(hex.slice(5,7),16)];}
  function hex(n){return Math.round(n).toString(16).padStart(2,"0");}
  var ca=parts(a), cb=parts(b);
  return "#"+hex(ca[0]*(1-p)+cb[0]*p)+hex(ca[1]*(1-p)+cb[1]*p)+hex(ca[2]*(1-p)+cb[2]*p);
}
function teamHeaderStyle(col){
  var warm=mixColor(col,"#ffd32f",0.2);
  var cool=mixColor(col,"#20c8ff",0.34);
  return "background:linear-gradient(135deg,"+warm+" 0%,"+col+" 52%,"+cool+" 100%);box-shadow:inset 0 1px 0 rgba(255,255,255,0.22);";
}

var STORAGE_KEY = "panini2026_html_v1";
var placed = {};
var raw = localStorage.getItem(STORAGE_KEY);
if(raw){
  try{
    var arr=JSON.parse(raw);
    for(var i=0;i<arr.length;i++) placed[arr[i]]=1;
  }catch(e){}
} else {
  placed={"FWC3":1,"FWC5":1,"FWC6":1,"FWC7":1};
  localStorage.setItem(STORAGE_KEY, JSON.stringify(Object.keys(placed)));
}

var currentFilter="missing";
var currentTeam=null;

function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(Object.keys(placed)));}

function toggle(id){
  if(placed[id])delete placed[id]; else placed[id]=1;
  save(); render();
}

function setFilter(f){
  currentFilter=f;
  document.getElementById('btn-missing').classList.toggle('active',f==='missing');
  document.getElementById('btn-have').classList.toggle('active',f==='have');
  document.getElementById('btn-all').classList.toggle('active',f==='all');
  render();
}

function setTeam(t){currentTeam=(currentTeam===t)?null:t; render();}

function exportData(){
  var keys=Object.keys(placed);
  var blob=new Blob([keys.join('\n')],{type:'text/plain'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='album-panini-backup.txt';
  a.click();
}

function importData(event){
  var file=event.target.files[0];
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    var lines=e.target.result.split('\n').filter(function(l){return l.trim();});
    placed={};
    for(var i=0;i<lines.length;i++) placed[lines[i].trim()]=1;
    save(); render();
    alert('Importado: '+lines.length+' figuritas');
  };
  reader.readAsText(file);
}

function printMissing(){
  var missing={};
  for(var i=0;i<TEAMS_ORDER.length;i++){
    var t=TEAMS_ORDER[i];
    var st=STICKER_DATA[t];
    var ml=[];
    for(var j=0;j<st.length;j++) if(!placed[st[j]])ml.push(st[j]);
    if(ml.length>0)missing[t]=ml;
  }
  var total=0;
  for(var t in missing)total+=missing[t].length;
  var html='<html><head><meta charset="UTF-8"><title>Figuritas que faltan</title><style>'
    +'body{font-family:Arial,sans-serif;padding:10px 14px;color:#000;font-size:11px;}'
    +'h1{font-size:14px;margin-bottom:2px;}h2{font-size:10px;color:#666;margin-bottom:8px;}'
    +'.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px 12px;}'
    +'.team{margin-bottom:4px;page-break-inside:avoid;}'
    +'.tn{font-weight:bold;font-size:10px;background:#f0f0f0;padding:2px 5px;border-radius:3px;margin-bottom:3px;display:inline-block;}'
    +'.chips{display:flex;flex-wrap:wrap;gap:3px;}'
    +'.chip{border:1px solid #bbb;border-radius:4px;padding:1px 5px;font-size:9px;font-weight:bold;}'
    +'.footer{margin-top:8px;font-size:9px;color:#999;border-top:1px solid #eee;padding-top:4px;}'
    +'@media print{button{display:none}}'
    +'</style></head><body>';
  html+='<h1>⚽ FIFA World Cup 2026 — Figuritas que FALTAN</h1>';
  html+='<h2>Total: '+total+' figuritas • '+new Date().toLocaleDateString('es-AR')+'</h2>';
  html+='<button onclick="window.print()" style="margin-bottom:10px;padding:6px 14px;font-size:13px;cursor:pointer;">🖨️ Imprimir</button>';
  html+='<div class="grid">';
  for(var i=0;i<TEAMS_ORDER.length;i++){
    var t=TEAMS_ORDER[i];
    if(!missing[t])continue;
    html+='<div class="team"><div class="tn">'+escapeHTML(teamLabel(t))+' ('+missing[t].length+')</div><div class="chips">';
    for(var j=0;j<missing[t].length;j++) html+='<span class="chip">'+escapeHTML(stickerLabel(missing[t][j]))+'</span>';
    html+='</div></div>';
  }
  html+='</div><div class="footer">diegoatvault.github.io/album-panini-2026</div></body></html>';
  var win=window.open('','_blank');
  win.document.write(html);
  win.document.close();
}

function render(){
  var search=normalizeText(document.getElementById('search').value);
  var total=0;
  for(var t in STICKER_DATA)total+=STICKER_DATA[t].length;
  var haveCount=Object.keys(placed).length;
  var pct=Math.round(haveCount/total*100);

  document.getElementById('s-total').textContent=total;
  document.getElementById('s-have').textContent=haveCount;
  document.getElementById('s-miss').textContent=total-haveCount;
  document.getElementById('s-pct').textContent=pct+'%';
  document.getElementById('prog-fill').style.width=pct+'%';

  // Teams bar with colors
  var bar=document.getElementById('teams-bar');
  var barHTML='<button style="padding:6px 12px;border-radius:12px;white-space:nowrap;border:2px solid '+(currentTeam===null?'#ffd32f':'rgba(255,255,255,0.32)')+';background:'+(currentTeam===null?'linear-gradient(90deg,#ffd32f,#ffef73)':'rgba(255,255,255,0.12)')+';color:'+(currentTeam===null?'#151000':'#fff')+';font-size:13px;cursor:pointer;flex-shrink:0;font-weight:'+(currentTeam===null?'bold':'normal')+';box-shadow:0 5px 14px rgba(0,0,0,0.16);" onclick="setTeam(null)"><span class="flag-emoji">🌎</span>Todos</button>';
  for(var i=0;i<TEAMS_ORDER.length;i++){
    var t=TEAMS_ORDER[i];
    var st=STICKER_DATA[t];
    var done=0;
    for(var j=0;j<st.length;j++) if(placed[st[j]])done++;
    var gpct=Math.round(done/st.length*100);
    var isActive=currentTeam===t;
    var bg,border,txt,fw;
    if(isActive){bg='linear-gradient(90deg,#ffd32f,#ffef73)';border='#ffd32f';txt='#151000';fw='bold';}
    else if(gpct>=60){bg='rgba(0,230,118,0.32)';border='#00e676';txt='#a6ffc9';fw='bold';}
    else if(gpct>=40){bg='rgba(255,211,47,0.3)';border='#ffd32f';txt='#ffe98a';fw='bold';}
    else{bg='rgba(32,200,255,0.15)';border='rgba(32,200,255,0.46)';txt='#d8f7ff';fw='normal';}
    barHTML+='<button style="padding:6px 12px;border-radius:12px;white-space:nowrap;border:2px solid '+border+';background:'+bg+';color:'+txt+';font-size:13px;cursor:pointer;flex-shrink:0;font-weight:'+fw+';box-shadow:0 5px 14px rgba(0,0,0,0.16);" onclick="setTeam(\''+t+'\')">'+teamChipHTML(t)+'</button>';
  }
  bar.innerHTML=barHTML;

  // Groups
  var gc=document.getElementById('groups');
  var gcHTML='';
  for(var i=0;i<TEAMS_ORDER.length;i++){
    var t=TEAMS_ORDER[i];
    if(currentTeam&&currentTeam!==t)continue;
    var stickers=STICKER_DATA[t];
    var col=COLORS[t]||'#333';
    var filtered=[];
    for(var j=0;j<stickers.length;j++){
      var id=stickers[j];
      var have=!!placed[id];
      var ms=!search||stickerSearchText(id).indexOf(search)>=0;
      var mf=currentFilter==='all'||(currentFilter==='have'&&have)||(currentFilter==='missing'&&!have);
      if(ms&&mf)filtered.push(id);
    }
    if(filtered.length===0)continue;
    var done=0;
    for(var j=0;j<stickers.length;j++) if(placed[stickers[j]])done++;
    var gpct=Math.round(done/stickers.length*100);
    var bc=gpct===100?'#00e676':gpct>60?'#ffd32f':'#ff4d6d';
    var sHTML='';
    for(var j=0;j<filtered.length;j++){
      var id=filtered[j];
      var have=!!placed[id];
      sHTML+='<button class="sticker'+(have?' have':'')+'" onclick="toggle(\''+id+'\')">'+(have?'✅':'❌')+' '+escapeHTML(stickerLabel(id))+'</button>';
    }
    gcHTML+='<div class="group"><div class="group-header" style="'+teamHeaderStyle(col)+'"><div class="group-title"><span class="group-name">'+teamLabelHTML(t)+'</span><span class="group-count">'+done+'/'+stickers.length+' ('+gpct+'%)</span></div><div class="group-prog"><div class="group-prog-fill" style="width:'+gpct+'%;background:'+bc+'"></div></div></div><div class="stickers">'+sHTML+'</div></div>';
  }
  gc.innerHTML=gcHTML;
}

render();
